<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="content">
    <div class="section-title">Sensor Overview</div>
      <div class="sensor-overview">

        <div class="sensor-card">
          <h3>Total Sensors</h3>
          <p id="totalSensors">3</p>
          <div class="card-sub">All registered devices</div>
        </div>

        <div class="sensor-card active">
          <h3>Active Sensors</h3>
          <p id="activeSensors">3</p>
          <div class="status-dot">
            <span class="dot"></span>
            Live
          </div>
        </div>

        <div class="sensor-card offline">
          <h3>Offline Sensors</h3>
          <p id="offlineSensors">0</p>
          <div class="card-sub">No issues detected</div>
        </div>
      </div>
  </div>
</body>
</html>
